<!DOCTYPE html>-scale=1"/>
  <title>Juanelos - Gastos</title>
  <link rel="stylesheet" href="styles.css">
  
</head>
<style>
:root {
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --success: #22c55e;
  --danger: #ef4444;
  --info: #3b82f6;
  --bg: #0f172a;
  --card: #ffffff;
  --text: #1e293b;
  --muted: #64748b;
}

/* ===== BASE ===== */
body {
  font-family: "Segoe UI", Arial;
  background: linear-gradient(135deg, #1e293b, #0f172a);
  margin: 0;
  padding: 20px;
  color: var(--text);
}

/* ===== TITULO ===== */
h1 {
  text-align: center;
  color: white;
  margin-bottom: 30px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

/* ===== CONTENEDOR ===== */
.container {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 20px;
  flex-wrap: nowrap; /* 👈 IMPORTANTE */
}

/* ===== CARDS ===== */
.box {
  background: var(--card);
  padding: 20px;
  border-radius: 16px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  transition: 0.2s;
}

.box:hover {
  transform: translateY(-3px);
}

/* ===== INPUTS ===== */
input, select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #e5e7eb;
  box-sizing: border-box;
  transition: 0.2s;
}

input:focus, select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 2px rgba(99,102,241,0.2);
}

/* ===== BOTONES ===== */
button {
  width: 100%;
  background: var(--primary);
  color: white;
  border: none;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
}

button:hover {
  background: var(--primary-dark);
}

button:active {
  transform: scale(0.97);
}

/* BOTONES PEQUEÑOS */
.btn-mini {
  width: auto;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 12px;
}

.btn-edit { background: #6b7280; }
.btn-delete { background: var(--danger); }
.btn-save { background: var(--success); }
.btn-cancel { background: #f59e0b; }

.btn-edit:hover { background: #4b5563; }
.btn-delete:hover { background: #dc2626; }
.btn-save:hover { background: #16a34a; }
.btn-cancel:hover { background: #d97706; }

/* BOTON CALCULAR */
#calcular {
  background: var(--success);
}
#calcular:hover {
  background: #16a34a;
}

/* ===== LISTAS ===== */
ul {
  background: #f8fafc;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  min-height: 120px;
  list-style: none;
}

/* ITEMS */
li {
  opacity: 0;
  transform: translateY(10px);
  animation: fadeIn 0.3s ease forwards;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 6px;
  background: white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ANIMACION */
@keyframes fadeIn {
  to { opacity: 1; transform: translateY(0); }
}

/* TEXTO */
.li-text {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ===== RESULTADOS ===== */
.resultados {
  width: 320px;
}

/* TARJETAS DE RESULTADO */
#resultados li {
  font-weight: 500;
  border-left: 5px solid transparent;
}

/* COLORES */
.resultado-positivo {
  background: #ecfdf5;
  color: var(--success);
  border-left-color: var(--success);
}

.resultado-negativo {
  background: #fef2f2;
  color: var(--danger);
  border-left-color: var(--danger);
}

.resultado-neutro {
  background: #f1f5f9;
  color: var(--muted);
}

.resultado-transferencia {
  background: #eff6ff;
  color: var(--info);
  border-left-color: var(--info);
}

/* ===== EXTRAS ===== */
.row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.muted {
  color: var(--muted);
  font-size: 13px;
}

.two {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
</style>
<body>
  <h1>JUANELOS - Gestor de Gastos</h1>

<div class="container">

  <!-- AMIGOS -->
  <div class="box">
    <h3>Amigos</h3>
    <input id="nombre" placeholder="Nombre">
    <button id="btnAgregarAmigo">Agregar</button>

    <ul id="listaAmigos"></ul>
  </div>

  <!-- GASTOS -->
  <div class="box">
    <h3>Gastos</h3>

    <select id="cmbAmigos"></select>
    <input id="monto" placeholder="Monto">

    <!-- NUEVO -->
    <select id="categoria">
      <option>Comida</option>
      <option>Bebida</option>
      <option>Postre</option>
    </select>

    <h4>¿Quiénes participan?</h4>
    <div id="participantes"></div>

    <button id="btnAgregarGasto">Agregar gasto</button>

    <ul id="listaGastos"></ul>
  </div>
<!-- RESULTADOS -->
  <div class="box resultados">
    <h3>Resultados</h3>
    <button id="calcular">Calcular</button>
    <button onclick="compartirWhatsApp()">Compartir por WhatsApp</button>
    <ul id="resultados"></ul>
  </div>



</div>


  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
  </script>

  <script>
    // ===== DATOS =====
let amigos = []; // {id, nombre}
let gastos = []; // {id, amigoId, monto, categoria, participantes[]}

const $ = (id) => document.getElementById(id);

// ===== UTIL =====
function generarId() {
  return Date.now().toString();
}

function nombrePorId(id) {
  const a = amigos.find(x => x.id === id);
  return a ? a.nombre : "";
}

// ===== AMIGOS =====
function agregarAmigo() {
  const nombre = $("nombre").value.trim();
  if (!nombre) return;

  amigos.push({ id: generarId(), nombre });

  $("nombre").value = "";
  renderAmigos();
  renderComboAmigos();
  renderParticipantes();
}

function renderAmigos() {
  const ul = $("listaAmigos");
  ul.innerHTML = "";

  amigos.forEach(a => {
    let li = document.createElement("li");
    li.textContent = a.nombre;
    ul.appendChild(li);
  });
}

function renderComboAmigos() {
  const sel = $("cmbAmigos");
  sel.innerHTML = "";

  amigos.forEach(a => {
    let op = document.createElement("option");
    op.value = a.id;
    op.textContent = a.nombre;
    sel.appendChild(op);
  });
}

// ===== PARTICIPANTES =====
function renderParticipantes() {
  const cont = $("participantes");
  cont.innerHTML = "";

  amigos.forEach(a => {
    const label = document.createElement("label");

    const check = document.createElement("input");
    check.type = "checkbox";
    check.value = a.id;
    check.checked = true;

    label.appendChild(check);
    label.append(" " + a.nombre);

    cont.appendChild(label);
    cont.appendChild(document.createElement("br"));
  });
}

// ===== GASTOS =====
function agregarGasto() {
  const amigoId = $("cmbAmigos").value;
  const monto = parseFloat($("monto").value);
  const categoria = $("categoria").value;

  const checks = document.querySelectorAll("#participantes input:checked");
  const participantes = Array.from(checks).map(c => c.value);

  if (!amigoId || isNaN(monto) || participantes.length === 0) return;

  gastos.push({
    id: generarId(),
    amigoId,
    monto,
    categoria,
    participantes
  });

  $("monto").value = "";
  renderGastos();
}

function renderGastos() {
  const ul = $("listaGastos");
  ul.innerHTML = "";

  gastos.forEach(g => {
    let li = document.createElement("li");

    let participantesTexto = g.participantes
      .map(id => nombrePorId(id))
      .join(", ");

    //li.textContent =
      //`${nombrePorId(g.amigoId)} pagó ${g.monto.toFixed(2)} (${g.categoria}) [${participantesTexto}]`;
      li.innerHTML = `
        <strong>${nombrePorId(g.amigoId)}</strong> pagó 
        <span style="color:#007bff;">$${g.monto.toFixed(2)}</span><br>
        <small>${g.categoria}</small><br>
        <small style="color:gray;">${participantesTexto}</small>
`;

    ul.appendChild(li);
  });
}
// ===== COMAPRTIR POR WSP =====
function compartirWhatsApp() {
  let items = document.querySelectorAll("#resultados li");

  if (items.length === 0) {
    alert("Primero calculá los resultados");
    return;
  }

  let mensaje = "📊 *JUANELOS - Resultados*\n\n";

  items.forEach(li => {
    mensaje += li.textContent + "\n";
  });

  let url = "https://wa.me/?text=" + encodeURIComponent(mensaje);

  window.open(url, "_blank");
}
// ===== CALCULAR =====
function calcular() {
  const lista = $("resultados");
  lista.innerHTML = "";

  if (amigos.length === 0 || gastos.length === 0) return;

  let totales = {};
  amigos.forEach(a => totales[a.id] = 0);

  // 💥 CLAVE
  gastos.forEach(g => {
    const parte = g.monto / g.participantes.length;

    g.participantes.forEach(id => {
      totales[id] -= parte;
    });

    totales[g.amigoId] += g.monto;
  });

  let total = gastos.reduce((acc, g) => acc + g.monto, 0);
  let promedio = total / amigos.length;

  agregarResultado("💰 Total gastado: " + total.toFixed(2));
  agregarResultado("👥 Promedio: " + promedio.toFixed(2));
  agregarResultado("");

  amigos.forEach(a => {
    let diff = totales[a.id];

    if (diff > 0)
      agregarResultado(`${a.nombre} recibe: +${diff.toFixed(2)}`, "positivo");
    else if (diff < 0)
      agregarResultado(`${a.nombre} debe: ${diff.toFixed(2)}`, "negativo");
    else
      agregarResultado(`${a.nombre} está al día`, "neutro");
  });

  agregarResultado("");
  agregarResultado("--- TRANSFERENCIAS ---");

  calcularTransferencias(totales);
}

// ===== TRANSFERENCIAS =====
function calcularTransferencias(totales) {
  let deudores = [];
  let acreedores = [];

  amigos.forEach(a => {
    let diff = totales[a.id];

    if (diff < 0)
      deudores.push({ id: a.id, monto: -diff });
    else if (diff > 0)
      acreedores.push({ id: a.id, monto: diff });
  });

  let i = 0, j = 0;

  while (i < deudores.length && j < acreedores.length) {
    let monto = Math.min(deudores[i].monto, acreedores[j].monto);

    agregarResultado(
      `${nombrePorId(deudores[i].id)} → ${nombrePorId(acreedores[j].id)}: ${monto.toFixed(2)}`,
      "transferencia"
    );

    deudores[i].monto -= monto;
    acreedores[j].monto -= monto;

    if (deudores[i].monto === 0) i++;
    if (acreedores[j].monto === 0) j++;
  }
}

// ===== RESULTADOS =====
function agregarResultado(texto, tipo = "") {
  const li = document.createElement("li");
  li.textContent = texto;

  li.style.padding = "10px";
  li.style.margin = "6px 0";
  li.style.borderRadius = "8px";
  li.style.fontWeight = "500";

  if (tipo === "positivo") {
    li.style.backgroundColor = "#d4edda";
    li.style.color = "#155724";
  } 
  else if (tipo === "negativo") {
    li.style.backgroundColor = "#f8d7da";
    li.style.color = "#721c24";
  } 
  else if (tipo === "transferencia") {
    li.style.backgroundColor = "#d1ecf1";
    li.style.color = "#0c5460";
  } 
  else {
    li.style.backgroundColor = "#f1f1f1";
  }

  $("resultados").appendChild(li);
}

// ===== EVENTOS =====
$("btnAgregarAmigo").addEventListener("click", agregarAmigo);
$("btnAgregarGasto").addEventListener("click", agregarGasto);
$("calcular").addEventListener("click", calcular);    

    // Render inicial
    renderAmigos();
    renderComboAmigos();
    renderGastos();
  </script>
</body>
</html>
